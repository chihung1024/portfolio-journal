<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Journal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 960px; }
        .card { margin-bottom: 1.5rem; }
        .header { margin-bottom: 2rem; }
        .footer { margin-top: 2rem; padding: 1rem; text-align: center; font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="header text-center">
            <h1>Portfolio Journal</h1>
            <p class="lead">Powered by Cloudflare Pages, D1, and GitHub Actions.</p>
        </div>

        <!-- Portfolio Summary -->
        <div class="card">
            <div class="card-header">
                Portfolio Summary
                <button id="refresh-portfolio-btn" class="btn btn-sm btn-primary float-end">Refresh</button>
            </div>
            <div class="card-body">
                <div id="portfolio-summary" class="row"><p>Loading portfolio...</p></div>
            </div>
        </div>

        <!-- Add Transaction -->
        <div class="card">
            <div class="card-header">Add New Transaction</div>
            <div class="card-body">
                <form id="add-transaction-form">
                    <div class="row g-3 align-items-end">
                        <div class="col-md"><label for="ticker" class="form-label">Ticker</label><input type="text" class="form-control" id="ticker" placeholder="e.g., AAPL" required></div>
                        <div class="col-md"><label for="shares" class="form-label">Shares</label><input type="number" class="form-control" id="shares" step="any" placeholder="e.g., 10" required></div>
                        <div class="col-md"><label for="price" class="form-label">Price</label><input type="number" class="form-control" id="price" step="any" placeholder="e.g., 150.25" required></div>
                        <div class="col-md"><label for="date" class="form-label">Date</label><input type="date" class="form-control" id="date" required></div>
                        <div class="col-auto"><button type="submit" class="btn btn-success">Add</button></div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Transactions List -->
        <div class="card">
            <div class="card-header">All Transactions</div>
            <div class="card-body">
                <div class="table-responsive" style="max-height: 400px;">
                    <table class="table table-striped table-hover">
                        <thead><tr><th>Ticker</th><th>Shares</th><th>Price</th><th>Date</th></tr></thead>
                        <tbody id="transactions-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Initialization Button -->
        <div class="card bg-light">
            <div class="card-body text-center">
                <p class="mb-2">First time setup? This will create tables and add sample data.</p>
                <button id="init-db-btn" class="btn btn-warning">Initialize Database</button>
            </div>
        </div>
    </div>

    <footer class="footer"><p>Data updated daily via yfinance.</p></footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const API_BASE_URL = '/api';

            const addTransactionForm = document.getElementById('add-transaction-form');
            const transactionsList = document.getElementById('transactions-list');
            const portfolioSummary = document.getElementById('portfolio-summary');
            const refreshPortfolioBtn = document.getElementById('refresh-portfolio-btn');
            const initDbBtn = document.getElementById('init-db-btn');

            const formatCurrency = (num) => num ? num.toLocaleString('en-US', { style: 'currency', currency: 'USD' }) : '$0.00';

            async function getTransactions() {
                try {
                    const response = await fetch(`${API_BASE_URL}/transactions`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const transactions = await response.json();
                    transactionsList.innerHTML = '';
                    transactions.forEach(tx => {
                        const row = document.createElement('tr');
                        row.innerHTML = `<td>${tx.ticker}</td><td>${tx.shares}</td><td>${formatCurrency(tx.price)}</td><td>${new Date(tx.date).toLocaleDateString()}</td>`;
                        transactionsList.appendChild(row);
                    });
                } catch (error) {
                    console.error('Error fetching transactions:', error);
                    transactionsList.innerHTML = '<tr><td colspan="4" class="text-danger">Failed to load transactions.</td></tr>';
                }
            }

            async function getPortfolio() {
                portfolioSummary.innerHTML = '<p>Refreshing portfolio...</p>';
                try {
                    const response = await fetch(`${API_BASE_URL}/portfolio`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const portfolio = await response.json();

                    portfolioSummary.innerHTML = '';
                    if (Object.keys(portfolio).length === 0) {
                        portfolioSummary.innerHTML = '<p>No portfolio data available. Add transactions to get started.</p>';
                        return;
                    }

                    for (const ticker in portfolio) {
                        const stock = portfolio[ticker];
                        const totalReturn = stock.totalReturn;
                        const totalReturnClass = totalReturn >= 0 ? 'text-success' : 'text-danger';
                        const totalReturnSign = totalReturn >= 0 ? '+' : '';

                        const stockCard = document.createElement('div');
                        stockCard.className = 'col-md-6 col-lg-4 mb-3';
                        stockCard.innerHTML = `
                            <div class="card h-100">
                                <div class="card-body">
                                    <h5 class="card-title">${ticker}</h5>
                                    <p class="card-text mb-1">
                                        <strong>Shares:</strong> ${stock.totalShares.toFixed(2)}<br>
                                        <strong>Avg Cost:</strong> ${formatCurrency(stock.averageCost)}<br>
                                        <strong>Market Value:</strong> ${formatCurrency(stock.marketValue)}
                                    </p>
                                    <p class="card-text mb-1">
                                        <strong>Unrealized P/L:</strong> <span class="${stock.unrealizedPnl >= 0 ? 'text-success' : 'text-danger'}">${stock.unrealizedPnl >= 0 ? '+' : ''}${formatCurrency(stock.unrealizedPnl)}</span><br>
                                        <strong>Dividends:</strong> <span class="text-success">+${formatCurrency(stock.totalDividends)}</span>
                                    </p>
                                    <hr>
                                    <p class="card-text fw-bold">
                                        <strong>Total Return:</strong> <span class="${totalReturnClass}">${totalReturnSign}${formatCurrency(totalReturn)}</span>
                                    </p>
                                </div>
                            </div>`;
                        portfolioSummary.appendChild(stockCard);
                    }
                } catch (error) {
                    console.error('Error fetching portfolio:', error);
                    portfolioSummary.innerHTML = '<p class="text-danger">Failed to load portfolio data.</p>';
                }
            }

            addTransactionForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const transaction = {
                    ticker: document.getElementById('ticker').value.toUpperCase(),
                    shares: parseFloat(document.getElementById('shares').value),
                    price: parseFloat(document.getElementById('price').value),
                    date: document.getElementById('date').value,
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/transactions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(transaction),
                    });
                    if (!response.ok) throw new Error((await response.json()).error || 'Failed to add transaction');
                    addTransactionForm.reset();
                    loadInitialData();
                } catch (error) {
                    console.error('Error adding transaction:', error);
                    alert(`Error: ${error.message}`);
                }
            });
            
            initDbBtn.addEventListener('click', async () => {
                if (!confirm('Are you sure you want to initialize the database? This will create tables and add sample data.')) return;
                try {
                    const response = await fetch(`${API_BASE_URL}/initialize-database`, { method: 'POST' });
                    const result = await response.json();
                    if (!response.ok) {
                        throw new Error(result.error || 'An unknown error occurred during initialization.');
                    }
                    alert('Database initialized successfully!');
                    loadInitialData();
                } catch (error) {
                    console.error('Error initializing database:', error);
                    alert(`Error initializing database: ${error.message}`);
                }
            });

            refreshPortfolioBtn.addEventListener('click', getPortfolio);

            function loadInitialData() {
                getTransactions();
                getPortfolio();
            }

            loadInitialData();
        });
    </script>
</body>
</html>
