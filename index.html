<script type="module">
    // --- FINAL SCRIPT - With Delete Functionality (FULL CODE) ---

    // --- Global Variables & Constants ---
    const API_BASE_URL = "https://portfolio-api-handler.chired.workers.dev"; // 確認這是您的正確網址
    let userId, userEmail;
    let transactions = [], userSplits = [], chart, twrChart, confirmCallback = null;

    // --- App Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        setupEventListeners();
        initializeChart();
        initializeTwrChart();
        lucide.createIcons();
        handleAuthentication();
    });

    // --- Authenticated Fetch Helper ---
    async function authedFetch(url, options = {}) {
        const token = localStorage.getItem('jwt_token');
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const response = await fetch(url, { ...options, headers });
        const contentType = response.headers.get("content-type");
        let data;
        if (contentType && contentType.indexOf("application/json") !== -1) {
            data = await response.json();
        }
        if (!response.ok) {
            throw new Error(data.error || `Request failed with status ${response.status}`);
        }
        return data;
    }

    // --- Main Data Loading Function ---
    async function loadInitialData() {
        if (!userId) return;
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const [transactionsData, snapshotData] = await Promise.all([
                authedFetch(`${API_BASE_URL}/api/transactions`),
                authedFetch(`${API_BASE_URL}/api/portfolio/snapshot`)
            ]);

            transactions = (transactionsData || []).map(t => ({...t, date: new Date(t.date)}));

            renderTransactionsTable();
            updateDashboard(snapshotData || {});
            renderHoldingsTable(snapshotData ? JSON.parse(snapshotData.holdings || '{}') : {});

        } catch (error) {
            showNotification('error', `讀取資料失敗: ${error.message}`);
            if (error.message.includes("Token")) handleLogout();
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    // --- Authentication Logic ---
    function handleAuthentication() {
        const token = localStorage.getItem('jwt_token');
        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 > Date.now()) {
                    userId = payload.userId;
                    userEmail = localStorage.getItem('user_email');
                    showLoggedInUI();
                } else { handleLogout(); }
            } catch (e) { handleLogout(); }
        } else { showLoggedOutUI(); }
    }
    async function handleRegister() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) { showNotification('error', '請輸入電子郵件和密碼。'); return; }
        try {
            const response = await fetch(`${API_BASE_URL}/api/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
            if(!response.ok) {
                const data = await response.json();
                throw new Error(data.error);
            }
            showNotification('success', '註冊成功！請現在登入。');
        } catch (error) { showNotification('error', `註冊失敗: ${error.message}`); }
    }
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) { showNotification('error', '請輸入電子郵件和密碼。'); return; }
        try {
            const data = await authedFetch(`${API_BASE_URL}/api/login`, { method: 'POST', body: JSON.stringify({ email, password }) });
            localStorage.setItem('jwt_token', data.token);
            localStorage.setItem('user_email', email);
            showNotification('success', '登入成功！');
            handleAuthentication();
        } catch (error) { showNotification('error', `登入失敗: ${error.message}`); }
    }
    function handleLogout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_email');
        userId = null; userEmail = null;
        window.location.reload();
    }

    // --- UI State Changers ---
    function showLoggedInUI() {
        document.getElementById('auth-container').classList.add('hidden');
        document.querySelector('main').classList.remove('hidden');
        const userInfo = document.getElementById('user-info');
        userInfo.classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('auth-status').textContent = '已連線 (Cloudflare)';
        document.getElementById('user-id').textContent = `使用者: ${userEmail}`;
        loadInitialData();
    }
    function showLoggedOutUI() {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('auth-container').classList.remove('hidden');
        document.querySelector('main').classList.add('hidden');
        document.getElementById('user-info').classList.add('hidden');
        document.getElementById('logout-btn').classList.add('hidden');

    // --- Event Listeners Setup ---
    function setupEventListeners() {
        document.getElementById('add-transaction-btn').addEventListener('click', () => openModal());
        document.getElementById('cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-backdrop-trans').addEventListener('click', closeModal);
        document.getElementById('transaction-form').addEventListener('submit', handleFormSubmit);
        document.getElementById('manage-splits-btn').addEventListener('click', openSplitModal);
        document.getElementById('cancel-split-btn').addEventListener('click', closeSplitModal);
        document.getElementById('modal-backdrop-split').addEventListener('click', closeSplitModal);
        document.getElementById('split-form').addEventListener('submit', handleSplitFormSubmit);
        document.getElementById('tabs').addEventListener('click', (e) => { e.preventDefault(); if (e.target.matches('.tab-item')) { switchTab(e.target.dataset.tab); } });
        document.getElementById('confirm-cancel-btn').addEventListener('click', hideConfirm);
        document.getElementById('confirm-ok-btn').addEventListener('click', () => { if (confirmCallback) { confirmCallback(); } hideConfirm(); });
        document.getElementById('currency').addEventListener('change', toggleOptionalFields);
        document.getElementById('login-btn').addEventListener('click', handleLogin);
        document.getElementById('register-btn').addEventListener('click', handleRegister);
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('update-benchmark-btn').addEventListener('click', handleUpdateBenchmark);
    }

    // --- Form Submit Handlers ---
    async function handleFormSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        const transactionData = {
            date: document.getElementById('transaction-date').value,
            symbol: document.getElementById('stock-symbol').value.toUpperCase().trim(),
            type: document.querySelector('input[name="transaction-type"]:checked').value,
            quantity: parseFloat(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value),
            currency: document.getElementById('currency').value,
            totalCost: document.getElementById('total-cost').value ? parseFloat(document.getElementById('total-cost').value) : null,
            exchangeRate: document.getElementById('exchange-rate').value ? parseFloat(document.getElementById('exchange-rate').value) : null,
        };
        if (!transactionData.date || !transactionData.symbol || isNaN(transactionData.quantity) || isNaN(transactionData.price)) {
            showNotification('error', '請填寫所有必要欄位（日期、代碼、股數、價格）。');
            return;
        }
        try {
            btn.disabled = true;
            btn.textContent = '計算中...';
            await authedFetch(`${API_BASE_URL}/api/transactions`, { method: 'POST', body: JSON.stringify(transactionData) });
            closeModal();
            showNotification('success', '交易已成功儲存！正在刷新數據...');
            await loadInitialData();
        } catch (error) {
            showNotification('error', `儲存失敗: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = '儲存';
        }
    }

    async function handleDelete(event) {
        const transactionId = event.target.dataset.id;
        if (!transactionId) return;
        showConfirm('您確定要刪除這筆交易紀錄嗎？此操作無法復原。', async () => {
            try {
                showNotification('info', '正在刪除並重新計算...');
                await authedFetch(`${API_BASE_URL}/api/transactions/${transactionId}`, {
                    method: 'DELETE'
                });
                showNotification('success', '交易已成功刪除！');
                await loadInitialData();
            } catch (error) {
                showNotification('error', `刪除失敗: ${error.message}`);
            }
        });
    }

    function renderHoldingsTable(holdingsData = {}) {
        const tableBody = document.getElementById('holdings-table-body');
        tableBody.innerHTML = '';
        const holdingsArray = Object.values(holdingsData);
        if (holdingsArray.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-gray-500">沒有持股紀錄。</td></tr>`;
            return;
        }
        holdingsArray.sort((a,b) => b.marketValueTWD - a.marketValueTWD).forEach(h => {
            const row = document.createElement('tr');
            const decimals = isTwStock(h.symbol) ? 0 : 2;
            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${h.symbol}</td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(h.quantity, decimals)}</td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(h.avgCostOriginal, 2)} <span class="text-xs text-gray-500">${h.currency}</span></td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(h.totalCostTWD, 0)}</td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(h.currentPriceOriginal, 2)} <span class="text-xs text-gray-500">${h.currency}</span></td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(h.marketValueTWD, 0)}</td>
                <td class="px-6 py-4 whitespace-nowrap font-semibold ${h.unrealizedPLTWD >= 0 ? 'text-red-600' : 'text-green-600'}">${formatNumber(h.unrealizedPLTWD, 0)}</td>
                <td class="px-6 py-4 whitespace-nowrap font-semibold ${h.returnRate >= 0 ? 'text-red-600' : 'text-green-600'}">${(h.returnRate || 0).toFixed(2)}%</td>
            `;
            tableBody.appendChild(row);
        });
    }
    function renderTransactionsTable() {
        const tableBody = document.getElementById('transactions-table-body');
        tableBody.innerHTML = '';
        if (transactions.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-500">沒有交易紀錄。</td></tr>`;
            return;
        }
        transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
        for (const t of transactions) {
            const row = document.createElement('tr');
            row.className = "hover:bg-gray-50";
            const typeText = { buy: '買入', sell: '賣出' };
            const typeColor = { buy: 'text-red-500', sell: 'text-green-500' };
            const decimals = isTwStock(t.symbol) ? 0 : 2;
            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">${new Date(t.date).toISOString().split('T')[0]}</td>
                <td class="px-6 py-4 whitespace-nowrap font-medium">${t.symbol.toUpperCase()}</td>
                <td class="px-6 py-4 whitespace-nowrap font-semibold ${typeColor[t.type]}">${typeText[t.type]}</td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(t.quantity, decimals)}</td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(t.price)} <span class="text-xs text-gray-500">${t.currency}</span></td>
                <td class="px-6 py-4 whitespace-nowrap">${formatNumber(t.totalCost || (t.price*t.quantity), 0)}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium"><button data-id="${t.id}" class="edit-btn text-indigo-600 hover:text-indigo-900 mr-3">編輯</button><button data-id="${t.id}" class="delete-btn text-red-600 hover:text-red-900">刪除</button></td>`;
            tableBody.appendChild(row);
        };
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', handleDelete));
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', handleEdit));
    }

    function updateDashboard(snapshot = {}) {
        const holdings = snapshot.holdings ? Object.values(JSON.parse(snapshot.holdings)) : [];
        const totalMarketValue = holdings.reduce((sum, h) => sum + h.marketValueTWD, 0);
        const unrealizedPL = holdings.reduce((sum, h) => sum + h.unrealizedPLTWD, 0);
        document.getElementById('total-assets').textContent = formatNumber(totalMarketValue, 0);
        const unrealizedEl = document.getElementById('unrealized-pl');
        unrealizedEl.textContent = formatNumber(unrealizedPL, 0);
        unrealizedEl.className = `text-3xl font-bold mt-2 ${unrealizedPL >= 0 ? 'text-red-600' : 'text-green-600'}`;
        document.getElementById('realized-pl').textContent = formatNumber(snapshot.totalRealizedPL || 0, 0);
        document.getElementById('total-return').textContent = `${(snapshot.overallReturnRate || 0).toFixed(2)}%`;
        document.getElementById('xirr-value').textContent = `${((snapshot.xirr || 0) * 100).toFixed(2)}%`;
    }
