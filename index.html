<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Journal (Cloudflare Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.378.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .card { background-color: white; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        .btn { transition: all 0.2s ease-in-out; }
        .btn:hover { transform: scale(1.02); }
        .modal-backdrop { background-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="text-gray-800">

    <div id="app" class="min-h-screen">
        <div id="notification-area" class="fixed top-5 right-5 z-50"></div>

        <header class="bg-white shadow-md sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i data-lucide="line-chart" class="text-indigo-600 h-8 w-8"></i>
                    <h1 class="text-2xl font-bold text-gray-800">Portfolio Journal</h1>
                </div>
                <button id="refresh-btn" class="btn bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-indigo-700 flex items-center space-x-2">
                    <i data-lucide="refresh-cw" class="h-5 w-5"></i><span>Refresh Data</span>
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-75 flex items-center justify-center z-40">
                 <div class="flex flex-col items-center"><svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p class="mt-4 text-lg font-medium text-gray-700">Loading data...</p></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="card p-5"><h3 class="text-sm font-medium text-gray-500">Total Assets (TWD)</h3><p id="total-assets" class="text-3xl font-bold text-gray-800 mt-2">0</p></div>
                <div class="card p-5"><h3 class="text-sm font-medium text-gray-500">Unrealized P/L</h3><p id="unrealized-pl" class="text-3xl font-bold text-gray-800 mt-2">0</p></div>
                <div class="card p-5"><h3 class="text-sm font-medium text-gray-500">Realized P/L</h3><p id="realized-pl" class="text-3xl font-bold text-gray-800 mt-2">0</p></div>
                <div class="card p-5"><h3 class="text-sm font-medium text-gray-500">Overall Return</h3><p id="total-return" class="text-3xl font-bold text-gray-800 mt-2">0.00%</p></div>
            </div>

            <div class="card p-6 mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Holdings</h2>
                    <button id="add-transaction-btn" class="btn bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-indigo-700 flex items-center space-x-2"><i data-lucide="plus-circle" class="h-5 w-5"></i><span>Add Transaction</span></button>
                </div>
                <div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ticker</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Shares</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Avg Cost</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Market Value</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Unrealized P/L</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Return</th></tr></thead><tbody id="holdings-table-body" class="bg-white divide-y divide-gray-200"></tbody></table></div>
            </div>

            <div class="card p-6 mb-8">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Transaction History</h2>
                <div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ticker</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Shares</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th><th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Actions</th></tr></thead><tbody id="transactions-table-body" class="bg-white divide-y divide-gray-200"></tbody></table></div>
            </div>
            
            <div class="text-center py-4">
                 <button id="init-db-btn" class="btn bg-yellow-500 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-yellow-600">Initialize/Reset Database with Sample Data</button>
            </div>
        </main>

        <!-- Transaction Modal -->
        <div id="transaction-modal" class="fixed inset-0 z-30 overflow-y-auto hidden"><div class="flex items-center justify-center min-h-screen"><div class="fixed inset-0 modal-backdrop"></div><div class="bg-white rounded-lg shadow-xl p-8 z-40 w-full max-w-md mx-4"><h3 id="modal-title" class="text-2xl font-bold mb-6 text-gray-800">Add Transaction</h3><form id="transaction-form"><input type="hidden" id="transaction-id"><div class="mb-4"><label for="transaction-date" class="block text-sm font-medium text-gray-700">Date</label><input type="date" id="transaction-date" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md" required></div><div class="mb-4"><label for="stock-symbol" class="block text-sm font-medium text-gray-700">Ticker</label><input type="text" id="stock-symbol" placeholder="e.g. AAPL, 2330.TW" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md" required></div><div class="mb-4"><label class="block text-sm font-medium text-gray-700">Type</label><div class="flex space-x-4 mt-1"><label class="flex items-center"><input type="radio" name="transaction-type" value="buy" class="h-4 w-4 text-indigo-600" checked> <span class="ml-2">Buy</span></label><label class="flex items-center"><input type="radio" name="transaction-type" value="sell" class="h-4 w-4 text-indigo-600"><span class="ml-2">Sell</span></label></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div><label for="quantity" class="block text-sm font-medium text-gray-700">Shares</label><input type="number" step="any" id="quantity" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md" required></div><div><label for="price" class="block text-sm font-medium text-gray-700">Price</label><input type="number" step="any" id="price" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md" required></div></div><div class="mb-4"><label for="currency" class="block text-sm font-medium text-gray-700">Currency</label><select id="currency" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md"><option>USD</option><option>TWD</option><option>HKD</option><option>JPY</option></select></div><div class="flex justify-end space-x-4 mt-6"><button type="button" id="cancel-btn" class="btn bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg">Cancel</button><button type="submit" id="save-btn" class="btn bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg">Save</button></div></form></div></div></div>
    </div>

    <script>
        const API_URL = '/api';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setupEventListeners();
            loadAllData();
        });

        function setupEventListeners() {
            document.getElementById('refresh-btn').addEventListener('click', loadAllData);
            document.getElementById('add-transaction-btn').addEventListener('click', () => openModal());
            document.getElementById('cancel-btn').addEventListener('click', closeModal);
            document.querySelector('#transaction-modal .modal-backdrop').addEventListener('click', closeModal);
            document.getElementById('transaction-form').addEventListener('submit', handleFormSubmit);
            document.getElementById('init-db-btn').addEventListener('click', initializeDatabase);
        }

        async function loadAllData() {
            showLoading(true);
            try {
                const [portfolio, transactions] = await Promise.all([
                    fetch(`${API_URL}/portfolio`).then(handleResponse),
                    fetch(`${API_URL}/transactions`).then(handleResponse)
                ]);
                renderDashboard(portfolio);
                renderHoldingsTable(portfolio.holdings);
                renderTransactionsTable(transactions);
                showNotification('success', 'Data refreshed successfully!');
            } catch (error) {
                showNotification('error', `Failed to load data: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function renderDashboard(portfolio) {
            document.getElementById('total-assets').textContent = formatCurrency(portfolio.totalMarketValueTWD, 'TWD');
            document.getElementById('unrealized-pl').textContent = formatCurrency(portfolio.totalUnrealizedPLTWD, 'TWD');
            document.getElementById('realized-pl').textContent = formatCurrency(portfolio.totalRealizedPL, 'TWD');
            document.getElementById('total-return').textContent = `${(portfolio.overallReturnRate || 0).toFixed(2)}%`;
            setElementClass(document.getElementById('unrealized-pl'), portfolio.totalUnrealizedPLTWD);
            setElementClass(document.getElementById('realized-pl'), portfolio.totalRealizedPL);
            setElementClass(document.getElementById('total-return'), portfolio.overallReturnRate);
        }

        function renderHoldingsTable(holdings) {
            const tableBody = document.getElementById('holdings-table-body');
            tableBody.innerHTML = '';
            const holdingsArray = Object.values(holdings || {});
            if (holdingsArray.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-gray-500">No holdings. Add a transaction to start.</td></tr>`;
                return;
            }
            holdingsArray.sort((a,b) => b.marketValueTWD - a.marketValueTWD).forEach(h => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50";
                row.innerHTML = `
                    <td class="px-6 py-4 font-medium">${h.symbol}</td>
                    <td class="px-6 py-4">${formatNumber(h.quantity)}</td>
                    <td class="px-6 py-4">${formatCurrency(h.avgCostOriginal, h.currency)}</td>
                    <td class="px-6 py-4">${formatCurrency(h.marketValueTWD, 'TWD')}</td>
                    <td class="px-6 py-4 font-semibold">${formatCurrency(h.unrealizedPLTWD, 'TWD')}</td>
                    <td class="px-6 py-4 font-semibold">${(h.returnRate || 0).toFixed(2)}%</td>
                `;
                setElementClass(row.cells[4], h.unrealizedPLTWD);
                setElementClass(row.cells[5], h.returnRate);
                tableBody.appendChild(row);
            });
        }

        function renderTransactionsTable(transactions) {
            const tableBody = document.getElementById('transactions-table-body');
            tableBody.innerHTML = '';
            if (!transactions || transactions.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-500">No transaction history.</td></tr>`;
                return;
            }
            transactions.forEach(t => {
                const row = document.createElement('tr');
                const total = t.totalCost || (t.quantity * t.price);
                row.innerHTML = `
                    <td class="px-6 py-4">${new Date(t.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 font-medium">${t.symbol}</td>
                    <td class="px-6 py-4"><span class="font-semibold ${t.type === 'buy' ? 'text-red-600' : 'text-green-600'}">${t.type}</span></td>
                    <td class="px-6 py-4">${formatNumber(t.quantity)}</td>
                    <td class="px-6 py-4">${formatCurrency(t.price, t.currency)}</td>
                    <td class="px-6 py-4">${formatCurrency(total, t.currency)}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="handleDelete('${t.id}')" class="text-red-500 hover:text-red-700 p-1"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </td>`;
                tableBody.appendChild(row);
            });
            lucide.createIcons();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const payload = {
                date: document.getElementById('transaction-date').value,
                symbol: document.getElementById('stock-symbol').value.toUpperCase().trim(),
                type: document.querySelector('input[name="transaction-type"]:checked').value,
                quantity: parseFloat(document.getElementById('quantity').value),
                price: parseFloat(document.getElementById('price').value),
                currency: document.getElementById('currency').value,
            };
            if (!payload.date || !payload.symbol || isNaN(payload.quantity) || isNaN(payload.price)) {
                return showNotification('error', 'Please fill all fields correctly.');
            }
            try {
                await fetch(`${API_URL}/transactions`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).then(handleResponse);
                closeModal();
                showNotification('success', 'Transaction saved! Refreshing data...');
                loadAllData();
            } catch (error) {
                showNotification('error', `Save failed: ${error.message}`);
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure you want to delete this transaction?')) return;
            try {
                await fetch(`${API_URL}/transactions/${id}`, { method: 'DELETE' }).then(handleResponse);
                showNotification('success', 'Transaction deleted! Refreshing data...');
                loadAllData();
            } catch (error) {
                showNotification('error', `Delete failed: ${error.message}`);
            }
        }

        async function initializeDatabase() {
            if (!confirm('This will ERASE all data and create sample records. Are you sure?')) return;
            showLoading(true);
            try {
                await fetch(`${API_URL}/initialize-database`, { method: 'POST' }).then(handleResponse);
                showNotification('success', 'Database has been reset! Reloading...');
                loadAllData();
            } catch (error) {
                showNotification('error', `Initialization failed: ${error.message}`);
                showLoading(false);
            }
        }
        
        // --- UI Helpers ---
        function openModal() {
            document.getElementById('transaction-form').reset();
            document.getElementById('transaction-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('transaction-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('transaction-modal').classList.add('hidden'); }
        function showLoading(isLoading) { document.getElementById('loading-overlay').style.display = isLoading ? 'flex' : 'none'; }
        function formatCurrency(value, currency = 'USD') { return (value || 0).toLocaleString('en-US', { style: 'currency', currency, minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function formatNumber(value, decimals = 2) { return (Number(value) || 0).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }); }
        function setElementClass(element, value) { if(element) { element.classList.toggle('text-green-600', value < 0); element.classList.toggle('text-red-600', value >= 0); } }
        function showNotification(type, message) {
            const area = document.getElementById('notification-area');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const icons = { success: 'check-circle', error: 'alert-circle', info: 'info' };
            const notification = document.createElement('div');
            notification.className = `flex items-center ${colors[type]} text-white text-sm font-bold px-4 py-3 rounded-md shadow-lg mb-2`;
            notification.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 mr-2"></i><p>${message}</p>`;
            area.appendChild(notification);
            lucide.createIcons({ nodes: [notification.querySelector('i')] });
            setTimeout(() => { notification.remove(); }, 4000);
        }
        async function handleResponse(response) {
            const text = await response.text();
            if (!response.ok) {
                let errorMsg = `HTTP error! status: ${response.status}`;
                try {
                    const jsonError = JSON.parse(text);
                    errorMsg = jsonError.error || errorMsg;
                } catch (e) { /* Not a JSON error, use default */ }
                throw new Error(errorMsg);
            }
            try {
                return JSON.parse(text);
            } catch (e) {
                return text; // Not JSON, return as is
            }
        }
    </script>
</body>
</html>
