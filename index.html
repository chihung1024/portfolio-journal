<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Journal</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Trading Journal</h1>
        <p class="lead">Powered by Cloudflare, D1, and GitHub Actions.</p>

        <!-- Portfolio Summary -->
        <div class="card mt-4">
            <div class="card-header">
                Portfolio Summary
                <button id="refresh-portfolio-btn" class="btn btn-primary btn-sm float-right">Refresh</button>
            </div>
            <div class="card-body">
                <div id="portfolio-summary"><p>Loading portfolio...</p></div>
            </div>
        </div>

        <!-- Add Transaction -->
        <div class="card mt-4">
            <div class="card-header">
                Add Transaction
            </div>
            <div class="card-body">
                <form id="add-transaction-form">
                    <div class="form-row">
                        <div class="col"><input type="text" class="form-control" id="ticker" placeholder="Ticker" required></div>
                        <div class="col"><input type="number" class="form-control" id="shares" placeholder="Shares" required></div>
                        <div class="col"><input type="number" step="0.01" class="form-control" id="price" placeholder="Price" required></div>
                        <div class="col"><input type="date" class="form-control" id="date" required></div>
                        <div class="col"><button type="submit" class="btn btn-success">Add</button></div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Transactions List -->
        <div class="card mt-4">
            <div class="card-header">Transactions</div>
            <div class="card-body">
                <ul id="transactions-list" class="list-group"></ul>
            </div>
        </div>

        <!-- Initialization Button -->
        <div class="card mt-4 bg-light">
            <div class="card-body text-center">
                <p class="mb-2">First time setup? This will create tables and add sample data.</p>
                <button id="init-db-btn" class="btn btn-warning">Initialize Database</button>
            </div>
        </div>
    </div>

    <footer class="text-center mt-4 mb-4"><p>Data updated daily via yfinance.</p></footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const API_BASE_URL = '/api';

            const addTransactionForm = document.getElementById('add-transaction-form');
            const transactionsList = document.getElementById('transactions-list');
            const portfolioSummary = document.getElementById('portfolio-summary');
            const refreshPortfolioBtn = document.getElementById('refresh-portfolio-btn');
            const initDbBtn = document.getElementById('init-db-btn');

            const formatCurrency = (num) => num ? num.toLocaleString('en-US', { style: 'currency', currency: 'USD' }) : '$0.00';

            async function getTransactions() {
                try {
                    const response = await fetch(`${API_BASE_URL}/transactions`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const transactions = await response.json();
                    transactionsList.innerHTML = '';
                    transactions.forEach(tx => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item';
                        li.textContent = `${tx.ticker}: ${tx.shares} shares at ${formatCurrency(tx.price)} on ${new Date(tx.date).toLocaleDateString()}`;
                        transactionsList.appendChild(li);
                    });
                } catch (error) {
                    console.error('Error fetching transactions:', error);
                    transactionsList.innerHTML = '<li class="list-group-item text-danger">Failed to load transactions.</li>';
                }
            }

            async function getPortfolio() {
                portfolioSummary.innerHTML = '<p>Refreshing portfolio...</p>';
                try {
                    const response = await fetch(`${API_BASE_URL}/portfolio`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const portfolio = await response.json();

                    portfolioSummary.innerHTML = '';
                    if (Object.keys(portfolio).length === 0) {
                        portfolioSummary.innerHTML = '<p>No portfolio data available. Add transactions to get started.</p>';
                        return;
                    }

                    for (const ticker in portfolio) {
                        const stock = portfolio[ticker];
                        const p = document.createElement('p');
                        const pnlClass = stock.totalReturn >= 0 ? 'text-success' : 'text-danger';
                        p.innerHTML = `
                            <b>${ticker}:</b> ${stock.totalShares.toFixed(2)} shares, 
                            Avg Cost: ${formatCurrency(stock.averageCost)}, 
                            Market Value: ${formatCurrency(stock.marketValue)}, 
                            Dividends: ${formatCurrency(stock.totalDividends)}, 
                            <span class="${pnlClass}">Total Return: ${formatCurrency(stock.totalReturn)}</span>
                        `;
                        portfolioSummary.appendChild(p);
                    }
                } catch (error) {
                    console.error('Error fetching portfolio:', error);
                    portfolioSummary.innerHTML = '<p class="text-danger">Failed to load portfolio data.</p>';
                }
            }

            addTransactionForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const transaction = {
                    ticker: document.getElementById('ticker').value.toUpperCase(),
                    shares: parseFloat(document.getElementById('shares').value),
                    price: parseFloat(document.getElementById('price').value),
                    date: document.getElementById('date').value,
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/transactions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(transaction),
                    });
                    if (!response.ok) throw new Error((await response.json()).error || 'Failed to add transaction');
                    addTransactionForm.reset();
                    loadInitialData();
                } catch (error) {
                    console.error('Error adding transaction:', error);
                    alert(`Error: ${error.message}`);
                }
            });
            
            initDbBtn.addEventListener('click', async () => {
                if (!confirm('Are you sure you want to initialize the database? This will create tables and add sample data.')) return;
                try {
                    const response = await fetch(`${API_BASE_URL}/initialize-database`, { method: 'POST' });
                    const result = await response.json();
                    if (!response.ok) {
                        throw new Error(result.error || 'An unknown error occurred during initialization.');
                    }
                    alert('Database initialized successfully!');
                    loadInitialData();
                } catch (error) {
                    console.error('Error initializing database:', error);
                    alert(`Error initializing database: ${error.message}`);
                }
            });

            refreshPortfolioBtn.addEventListener('click', getPortfolio);

            function loadInitialData() {
                getTransactions();
                getPortfolio();
            }

            loadInitialData();
        });
    </script>
</body>
</html>
